name: 部署到 GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安装依赖（使用 npm ci）
        run: npm ci
      - name: 调试：检查 hexo 可执行文件
        run: |
          ls -la node_modules/.bin/hexo || echo "hexo 可执行文件不存在"
          npx hexo --version || echo "npx 无法调用 hexo"
      - name: Build Hexo
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Advanced Color Picker</title>
  <link rel="stylesheet" href="ColorSelector/style.css">
</head>
<body>

<h1>高级色彩工具</h1>

<div class="panel">
  <input type="color" id="colorPicker">
  <div id="colorBox"></div>
  <p id="colorValue">#000000</p>
  <button id="saveBtn">保存色块为图片</button>
</div>

<hr>

<h2>图片吸色器</h2>
<input type="file" id="imageUpload">
<canvas id="canvas"></canvas>

<script src="ColorSelector/script.js"></script>
</body>
</html>

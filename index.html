<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的现代化网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            color: #333;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .modern-button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: white;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modern-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .modern-button:hover::before {
            left: 100%;
        }

        .modern-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .modern-button:active {
            transform: translateY(0) scale(0.98);
        }

        .secondary-button {
            background: linear-gradient(45deg, #2ecc71, #1abc9c);
        }

        .tertiary-button {
            background: linear-gradient(45deg, #e74c3c, #e67e22);
        }

        .quaternary-button {
            background: linear-gradient(45deg, #9b59b6, #8e44ad);
        }

        .info-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }

        .info-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .info-section ul {
            list-style: none;
            padding-left: 0;
        }

        .info-section li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
            color: #555;
        }

        .info-section li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #2ecc71;
            font-weight: bold;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 烟花效果 */
        .firework {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-star"></i> 欢迎来到我的网站</h1>
            <p class="subtitle">这是一个现代化、美观的个人网站，为您提供丰富的功能体验</p>
        </div>

        <div class="button-grid">
            <a href="https://tutunihao.github.io/3%20Cannons%20and%2015%20Soldiers/" class="modern-button">
                <i class="fas fa-gamepad"></i>
                游戏体验
            </a>
            
            <a href="https://tutunihao.github.io/removePDF/" class="modern-button secondary-button">
                <i class="fas fa-file-pdf"></i>
                PDF工具
            </a>
            
            <a href="https://tutunihao.github.io/What%20time%20is%20it%3F/" class="modern-button tertiary-button">
                <i class="fas fa-clock"></i>
                时间查询
            </a>
            
            <a href="https://tutunihao.github.io/ColorSelector/" class="modern-button quaternary-button">
                <i class="fas fa-palette"></i>
                色彩工具
            </a>
        </div>

        <div class="info-section">
            <h2><i class="fas fa-info-circle"></i> 网站特色</h2>
            <ul>
                <li>现代化的设计风格，使用渐变色彩和毛玻璃效果</li>
                <li>响应式布局，适配各种设备屏幕</li>
                <li>流畅的交互动画和悬停效果</li>
                <li>直观的功能分类和图标展示</li>
                <li>优化的用户体验和视觉层次</li>
            </ul>
            
            <div class="feature-grid">
                <div class="feature-item"><i class="fas fa-bolt"></i> 快速加载</div>
                <div class="feature-item"><i class="fas fa-mobile-alt"></i> 移动友好</div>
                <div class="feature-item"><i class="fas fa-paint-brush"></i> 美观设计</div>
                <div class="feature-item"><i class="fas fa-plug"></i> 易于扩展</div>
            </div>
        </div>
    </div>

    <script>
        // 点击按钮时创建烟花效果
        document.querySelectorAll('.modern-button').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 创建烟花效果
                createFireworks(this);
                
                // 0.8秒后跳转页面
                setTimeout(() => {
                    window.location.href = this.href;
                }, 800);
            });
        });
        
        function createFireworks(button) {
            const buttonRect = button.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;
            
            const colors = ['#ff416c', '#ff4b2b', '#00c9ff', '#92fe9d', '#ffcc00', '#667eea', '#764ba2'];
            
            for (let i = 0; i < 25; i++) {
                const firework = document.createElement('div');
                firework.classList.add('firework');
                
                // 随机颜色
                const color = colors[Math.floor(Math.random() * colors.length)];
                firework.style.backgroundColor = color;
                
                // 随机大小
                const size = Math.random() * 4 + 2;
                firework.style.width = `${size}px`;
                firework.style.height = `${size}px`;
                
                // 初始位置
                firework.style.left = `${centerX}px`;
                firework.style.top = `${centerY}px`;
                
                document.body.appendChild(firework);
                
                // 随机方向
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                // 动画效果
                firework.animate([
                    { transform: 'translate(0, 0)', opacity: 1 },
                    { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
                ], {
                    duration: 800,
                    easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });
                
                // 动画结束后移除元素
                setTimeout(() => {
                    firework.remove();
                }, 800);
            }
        }
    </script>
</body>
</html>
